name: Performance tests k6

on: [push]

jobs:
  ejecutar-k6:
    name: Run Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Download the code
        uses: actions/checkout@v3

      - name: Run k6 localy
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js
          flags: --env TIPO=smoke